<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Voice Library | 雨宿りの場所 Lueur</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 雨粒アニメーション用コンテナ -->
    <div id="rain-container"></div>

    <!-- 全体を包むかすかな光のオーバーレイ -->
    <div class="light-overlay"></div>

    <main class="container">
        <header class="fade-in">
            <h1 class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">Lueur</a></h1>
            <p class="subtitle">Voice Library</p>
        </header>

        <nav class="fade-in">
            <ul>
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="library.html" class="nav-link"
                        style="color: var(--accent-color); text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);">Library</a>
                </li>
                <li><a href="index.html#link" class="nav-link">Link</a></li>
            </ul>
        </nav>

        <!-- Libraryセクション (検索機能) -->
        <section id="library" class="section fade-in" style="margin-top: 0; padding-top: 50px; border-top: none;">
            <p class="section-desc">いまの気分や、望む音から、この隠れ家での過ごし方を見つけてください。</p>

            <div class="content-block" style="margin-bottom: 40px; text-align: left;">
                <!-- 雰囲気 -->
                <div class="filter-group">
                    <h4 class="filter-title">Mood (今の気持ち)</h4>
                    <div class="filter-buttons" data-filter-group="mood">
                        <button class="filter-btn active" data-filter="all">すべて</button>
                        <button class="filter-btn" data-filter="sleep">眠れない夜に</button>
                        <button class="filter-btn" data-filter="comfort">慰めてほしい</button>
                        <button class="filter-btn" data-filter="work">作業・読書のお供に</button>
                    </div>
                </div>

                <!-- 長さ -->
                <div class="filter-group">
                    <h4 class="filter-title">Length (時間の長さ)</h4>
                    <div class="filter-buttons" data-filter-group="length">
                        <button class="filter-btn active" data-filter="all">すべて</button>
                        <button class="filter-btn" data-filter="short">5分以内</button>
                        <button class="filter-btn" data-filter="medium">10〜15分</button>
                        <button class="filter-btn" data-filter="long">15分以上</button>
                    </div>
                </div>

                <!-- 詳細検索（アコーディオン開閉ボタン） -->
                <div class="filter-group" style="margin-top: 20px;">
                    <button class="filter-btn toggle-btn" id="advanced-search-toggle"
                        style="width: 100%; border-style: dashed;">🔍 詳細検索を開く</button>
                </div>

                <!-- 詳細検索パネル（初期状態は非表示） -->
                <div id="advanced-search-panel" class="advanced-search-panel"
                    style="display: none; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 20px;">

                    <div class="filter-group">
                        <h4 class="filter-title">Situation (シチュエーション)</h4>
                        <div class="filter-buttons advanced-tags" data-filter-group="situation">
                            <label class="tag-checkbox"><input type="checkbox" value="添い寝"> 添い寝</label>
                            <label class="tag-checkbox"><input type="checkbox" value="慰め"> 慰め</label>
                            <label class="tag-checkbox"><input type="checkbox" value="看病"> 看病</label>
                            <label class="tag-checkbox"><input type="checkbox" value="雑談"> 雑談</label>
                            <label class="tag-checkbox"><input type="checkbox" value="朗読"> 朗読</label>
                            <label class="tag-checkbox"><input type="checkbox" value="作業見守り"> 作業見守り</label>
                            <label class="tag-checkbox"><input type="checkbox" value="隣に座る"> 隣に座る</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h4 class="filter-title">Texture (音の質感)</h4>
                        <div class="filter-buttons advanced-tags" data-filter-group="texture">
                            <label class="tag-checkbox"><input type="checkbox" value="吐息"> 吐息</label>
                            <label class="tag-checkbox"><input type="checkbox" value="囁き"> 囁き</label>
                            <label class="tag-checkbox"><input type="checkbox" value="耳かき"> 耳かき</label>
                            <label class="tag-checkbox"><input type="checkbox" value="ポンポン"> ポンポン</label>
                            <label class="tag-checkbox"><input type="checkbox" value="雨音"> 雨音</label>
                        </div>
                    </div>

                    <div class="filter-group">
                        <h4 class="filter-title">Type (用途・仕様)</h4>
                        <div class="filter-buttons advanced-tags" data-filter-group="type">
                            <label class="tag-checkbox"><input type="checkbox" value="睡眠導入"> 睡眠導入</label>
                            <label class="tag-checkbox"><input type="checkbox" value="作業用BGM"> 作業用BGM</label>
                            <label class="tag-checkbox"><input type="checkbox" value="ASMR"> ASMR</label>
                            <label class="tag-checkbox"><input type="checkbox" value="バイノーラル"> バイノーラル</label>
                        </div>
                    </div>
                </div>

                <!-- オプション -->
                <div class="filter-group" style="margin-bottom: 0;">
                    <h4 class="filter-title">Option (特別)</h4>
                    <div class="filter-buttons">
                        <button class="filter-btn toggle-btn" id="fav-filter-btn">★ お気に入りのみ表示</button>
                    </div>
                </div>
            </div>

            <!-- 音声リスト (JSで生成) -->
            <div class="library-list" id="library-list"></div>
        </section>

    </main>

    <footer class="footer fade-in">
        <p><small>&copy; Lueur Project</small></p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
